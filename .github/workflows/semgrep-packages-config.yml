name: Semgrep Supply Chain (packages.config)

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  test-converter:
    name: Test packages.config converter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run converter unit tests
        run: python scripts/test_packages_config_to_csproj.py

  semgrep:
    name: Semgrep Supply Chain Scan
    runs-on: ubuntu-latest
    needs: test-converter
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Install Semgrep
        run: pip install semgrep

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Convert packages.config
        # --validate-restore: attempts dotnet restore after writing each synthetic .csproj,
        # strips any packages causing NU1202 (incompatible TFM), and retries.
        # This ensures the maximum number of packages are scanned even when a repo
        # contains old packages that only ship ancient TFM assets (e.g. net35-only).
        run: python scripts/packages_config_to_csproj.py --scan-dir . --validate-restore

      - name: Run Semgrep
        run: semgrep ci --allow-local-builds
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Clean up synthetic files
        if: always()
        run: find . -type d -name "_semgrep_sc" -exec rm -rf {} +
